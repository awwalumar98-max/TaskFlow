<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Simple Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================
       HEADER (Member 1)
       ============================ -->
  <header id="site-header">
    <!-- Member 1: Add app title and tagline here -->
  </header>

  <!-- ============================
       MAIN CONTENT
       ============================ -->
  <main id="app">

    <!-- TASK INPUT FORM (Member 2) -->
    <section id="task-form-section">
      <!-- Member 2: Add input field and Add Task button here -->
    </section>

    <!-- FILTER CONTROLS (Member 11) -->
    <section id="filter-section">
      <!-- Member 11: Add All / Active / Completed filter buttons here -->
    </section>

    <!-- TASK COUNTER (Member 12) -->
    <div id="task-counter">
      <!-- Member 12: Display task count here e.g. "3 tasks remaining" -->
    </div>

    <!-- TASK LIST (Member 3) -->
    <section id="task-list-section">
      <ul id="task-list">
        <!-- Member 7–10 will inject task items here via JavaScript -->
      </ul>
    </section>

    <!-- CLEAR COMPLETED BUTTON (Member 13) -->
    <div id="clear-section">
      <!-- Member 13: Add "Clear Completed" button here -->
    </div>

  </main>

  <!-- ============================
       FOOTER (Member 4)
       ============================ -->
  <footer id="site-footer">
    <!-- Member 4: Add credits and team member names here -->
  </footer>

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
